<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bek Tour — Дачи и виллы</title>
<meta name="description" content="Аренда дач и вилл в Узбекистане: Чарвак, Чимган. Bek Tour.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<style>
.dacha-hero{background:linear-gradient(rgba(6,24,38,.75),rgba(6,24,38,.9)),url('images/hero/1.webp') center/cover;padding:120px 24px 60px;text-align:center}
.dacha-hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);color:#fff}
.dacha-hero h1 em{color:var(--gold,#C8A45D);font-style:italic}
.dacha-hero p{color:rgba(255,255,255,.55);margin-top:.6rem;font-size:.9rem}
.dacha-filters{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:1.6rem}
.dacha-filter{padding:.55rem 1.2rem;border-radius:99px;border:1px solid rgba(255,255,255,.25);background:transparent;color:#fff;font-size:.8rem;cursor:pointer;transition:.2s}
.dacha-filter.on,.dacha-filter:hover{background:var(--gold,#C8A45D);border-color:var(--gold,#C8A45D);color:#061826}
.dacha-grid{max-width:1200px;margin:0 auto;padding:3rem 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.6rem}
.dacha-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.08);transition:.25s;text-decoration:none;color:#1a2530;display:block}
.dacha-card:hover{transform:translateY(-5px);box-shadow:0 14px 34px rgba(0,0,0,.14)}
.dacha-img{height:210px;background:#e8e2d5 center/cover no-repeat;position:relative}
.dacha-type{position:absolute;top:12px;left:12px;background:var(--gold,#C8A45D);color:#061826;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:.35rem .8rem;border-radius:99px}
.dacha-body{padding:1.1rem 1.2rem 1.3rem}
.dacha-name{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:600}
.dacha-loc{font-size:.76rem;color:#7a8794;margin-top:.25rem}
.dacha-loc i{color:var(--gold,#C8A45D);margin-right:.3rem}
.dacha-meta{display:flex;gap:1rem;margin-top:.7rem;font-size:.74rem;color:#5a6570}
.dacha-meta i{color:var(--gold,#C8A45D);margin-right:.25rem}
.dacha-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.9rem;padding-top:.9rem;border-top:1px solid #eee}
.dacha-price{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.dacha-price span{font-size:.68rem;color:#8a95a0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:400}
.dacha-btn{background:#061826;color:#fff;font-size:.74rem;padding:.5rem 1rem;border-radius:8px}
.dacha-empty{text-align:center;color:#8a95a0;padding:4rem 1rem;grid-column:1/-1}
body{background:#f6f3ec}
</style>
</head>
<body>

<div id="navbar-ph"></div>

<div class="dacha-hero">
  <h1>Дачи и <em>виллы</em> Узбекистана</h1>
  <p>Чарвак · Чимган · Отдых на природе с комфортом</p>
  <div class="dacha-filters" id="filters">
    <button class="dacha-filter on" data-type="all">Все</button>
    <button class="dacha-filter" data-type="dacha">Дачи</button>
    <button class="dacha-filter" data-type="villa">Виллы</button>
    <button class="dacha-filter" data-type="guesthouse">Гостевые дома</button>
  </div>
</div>

<div class="dacha-grid" id="grid">
  <div class="dacha-empty">Загрузка...</div>
</div>

<div id="footer-ph"></div>

<script src="bundle.js"></script>
<script>
const IMG_EXT = ['webp','jpg','jpeg','png'];
const AMENITY_ICONS = {
  pool:'fa-swimming-pool', wifi:'fa-wifi', bbq:'fa-fire', parking:'fa-car',
  kitchen:'fa-utensils', ac:'fa-snowflake', sauna:'fa-hot-tub',
  fireplace:'fa-fire-flame-curved', heating:'fa-temperature-high'
};

let allProps = [];

function firstPhoto(id){
  // returns a promise resolving to url of images/properties/{id}/1.*
  return new Promise(resolve => {
    let i = 0;
    const tryNext = () => {
      if(i >= IMG_EXT.length) return resolve(null);
      const url = `images/properties/${id}/1.${IMG_EXT[i++]}`;
      const img = new Image();
      img.onload = () => resolve(url);
      img.onerror = tryNext;
      img.src = url;
    };
    tryNext();
  });
}

async function load(){
  try{
    const r = await fetch('data/properties.json?t=' + Date.now());
    const data = await r.json();
    allProps = (data.properties || []).filter(p => p.active !== false);
    render('all');
  }catch(e){
    document.getElementById('grid').innerHTML =
      '<div class="dacha-empty">Не удалось загрузить каталог</div>';
  }
}

async function render(type){
  const grid = document.getElementById('grid');
  const list = type === 'all' ? allProps : allProps.filter(p => p.type === type);
  if(!list.length){
    grid.innerHTML = '<div class="dacha-empty">В этой категории пока пусто</div>';
    return;
  }
  const typeLabel = {dacha:'Дача', villa:'Вилла', guesthouse:'Гостевой дом', hotel:'Отель'};
  grid.innerHTML = list.map(p => `
    <a class="dacha-card" href="property.html?id=${p.id}" data-pid="${p.id}">
      <div class="dacha-img" id="img-${p.id}">
        <div class="dacha-type">${typeLabel[p.type] || p.type}</div>
      </div>
      <div class="dacha-body">
        <div class="dacha-name">${p.name.ru}</div>
        <div class="dacha-loc"><i class="fa fa-map-marker-alt"></i>${p.location.ru}</div>
        <div class="dacha-meta">
          <span><i class="fa fa-users"></i>${p.guests} гостей</span>
          <span><i class="fa fa-bed"></i>${p.bedrooms} спальни</span>
          <span><i class="fa fa-bath"></i>${p.bathrooms}</span>
        </div>
        <div class="dacha-foot">
          <div class="dacha-price">$${p.price} <span>/ ${p.per === 'night' ? 'ночь' : 'день'}</span></div>
          <div class="dacha-btn">Подробнее</div>
        </div>
      </div>
    </a>
  `).join('');
  // load photos async
  list.forEach(async p => {
    const url = await firstPhoto(p.id);
    const el = document.getElementById('img-' + p.id);
    if(el && url) el.style.backgroundImage = `url('${url}')`;
  });
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.dacha-filter');
  if(!btn) return;
  document.querySelectorAll('.dacha-filter').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render(btn.dataset.type);
});

async function loadComponent(url, id){
  try{ const r = await fetch(url); document.getElementById(id).innerHTML = await r.text(); }catch(e){}
}
Promise.all([
  loadComponent('navbar.html','navbar-ph'),
  loadComponent('footer.html','footer-ph'),
]).then(() => { if(window.onComponentsLoaded) onComponentsLoaded(); });

load();
</script>
</body>
</html>
