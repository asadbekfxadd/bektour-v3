<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bek Tour — Объект</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="css/gallery.css">
<style>
body{background:#f6f3ec;color:#1a2530}
.prop-wrap{max-width:1100px;margin:0 auto;padding:110px 1.5rem 4rem}
.prop-head{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;margin-bottom:1.4rem}
.prop-title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.3rem);font-weight:700}
.prop-loc{color:#7a8794;font-size:.85rem;margin-top:.3rem}
.prop-loc i{color:var(--gold,#C8A45D);margin-right:.35rem}
.prop-price{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;text-align:right}
.prop-price span{font-size:.72rem;color:#8a95a0;font-family:'Plus Jakarta Sans',sans-serif;font-weight:400}
.prop-cover{height:min(52vh,460px);border-radius:18px;background:#e8e2d5 center/cover;margin-bottom:1rem;cursor:pointer}
.prop-cols{display:grid;grid-template-columns:1.7fr 1fr;gap:2rem;margin-top:2rem}
@media(max-width:820px){.prop-cols{grid-template-columns:1fr}}
.prop-desc{font-size:.94rem;line-height:1.75;color:#3a4550}
.prop-meta{display:flex;gap:1.4rem;flex-wrap:wrap;margin:1.2rem 0;padding:1rem 0;border-top:1px solid #e5ded0;border-bottom:1px solid #e5ded0;font-size:.85rem}
.prop-meta i{color:var(--gold,#C8A45D);margin-right:.4rem}
.prop-amenities{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem}
.prop-amenity{background:#fff;border:1px solid #e5ded0;border-radius:99px;padding:.45rem 1rem;font-size:.76rem;color:#4a5560}
.prop-amenity i{color:var(--gold,#C8A45D);margin-right:.4rem}
.book-card{background:#061826;border-radius:18px;padding:1.6rem;color:#fff;height:fit-content;position:sticky;top:100px}
.book-card h3{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:.4rem}
.book-card p{font-size:.78rem;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:1.2rem}
.book-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;background:#25D366;color:#fff;border-radius:10px;padding:.9rem;font-weight:600;font-size:.9rem;text-decoration:none;transition:.2s}
.book-btn:hover{filter:brightness(1.1)}
.book-btn.tg{background:#2AABEE;margin-top:.7rem}
.gallery-title{font-family:'Playfair Display',serif;font-size:1.3rem;margin:2.4rem 0 .4rem}
.back-link{color:#7a8794;font-size:.8rem;text-decoration:none;display:inline-block;margin-bottom:1rem}
.back-link:hover{color:var(--gold,#C8A45D)}
</style>
</head>
<body>

<div id="navbar-ph"></div>

<div class="prop-wrap" id="propWrap">
  <div style="text-align:center;color:#8a95a0;padding:4rem;">Загрузка...</div>
</div>

<div id="footer-ph"></div>

<script src="bundle.js"></script>
<script src="js/gallery.js"></script>
<script>
const AMENITY_LABELS = {
  pool:['fa-swimming-pool','Бассейн'], wifi:['fa-wifi','Wi-Fi'],
  bbq:['fa-fire','Мангал'], parking:['fa-car','Парковка'],
  kitchen:['fa-utensils','Кухня'], ac:['fa-snowflake','Кондиционер'],
  sauna:['fa-hot-tub','Сауна'], fireplace:['fa-fire-flame-curved','Камин'],
  heating:['fa-temperature-high','Отопление']
};
const typeLabel = {dacha:'Дача', villa:'Вилла', guesthouse:'Гостевой дом', hotel:'Отель'};

async function load(){
  const id = new URLSearchParams(location.search).get('id');
  const wrap = document.getElementById('propWrap');
  if(!id){ wrap.innerHTML = '<p style="padding:3rem;text-align:center;">Объект не указан</p>'; return; }

  try{
    const r = await fetch('data/properties.json?t=' + Date.now());
    const data = await r.json();
    const p = (data.properties||[]).find(x => x.id === id);
    if(!p){ wrap.innerHTML = '<p style="padding:3rem;text-align:center;">Объект не найден</p>'; return; }

    document.title = 'Bek Tour — ' + p.name.ru;
    const waText = encodeURIComponent(`Здравствуйте! Интересует "${p.name.ru}" ($${p.price}/ночь). Свободные даты?`);

    wrap.innerHTML = `
      <a class="back-link" href="dachas.html">← Все дачи и виллы</a>
      <div class="prop-head">
        <div>
          <div class="prop-title">${p.name.ru}</div>
          <div class="prop-loc"><i class="fa fa-map-marker-alt"></i>${p.location.ru} · ${typeLabel[p.type]||p.type}</div>
        </div>
        <div class="prop-price">$${p.price} <span>/ ${p.per==='night'?'ночь':'день'}</span></div>
      </div>

      <div class="prop-cover" id="cover"></div>

      <div class="prop-cols">
        <div>
          <div class="prop-meta">
            <span><i class="fa fa-users"></i>до ${p.guests} гостей</span>
            <span><i class="fa fa-bed"></i>${p.bedrooms} спальни</span>
            <span><i class="fa fa-bath"></i>${p.bathrooms} санузла</span>
          </div>
          <div class="prop-desc">${p.desc.ru}</div>
          <div class="prop-amenities">
            ${(p.amenities||[]).map(a => {
              const [icon,label] = AMENITY_LABELS[a] || ['fa-check',a];
              return `<div class="prop-amenity"><i class="fa ${icon}"></i>${label}</div>`;
            }).join('')}
          </div>

          <div class="gallery-title">Фотографии</div>
          <div class="auto-gallery" data-folder="images/properties/${p.id}"></div>
        </div>

        <div class="book-card">
          <h3>Забронировать</h3>
          <p>Напишите нам — ответим за 10 минут, подберём даты и организуем трансфер.</p>
          <a class="book-btn" href="https://wa.me/${p.whatsapp}?text=${waText}" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
          </a>
          <a class="book-btn tg" href="contacts.html">
            <i class="fa fa-envelope"></i> Форма заявки
          </a>
        </div>
      </div>
    `;

    // cover = first photo
    const url = await findImageByNumber(`images/properties/${p.id}`, 1);
    if(url){
      const cover = document.getElementById('cover');
      cover.style.backgroundImage = `url('${url}')`;
      cover.onclick = () => openLightbox(url);
    }
    // init gallery block that we just inserted
    document.querySelectorAll('.auto-gallery').forEach(initGallery);
  }catch(e){
    wrap.innerHTML = '<p style="padding:3rem;text-align:center;">Ошибка загрузки</p>';
  }
}

async function loadComponent(url, id){
  try{ const r = await fetch(url); document.getElementById(id).innerHTML = await r.text(); }catch(e){}
}
Promise.all([
  loadComponent('navbar.html','navbar-ph'),
  loadComponent('footer.html','footer-ph'),
]).then(() => { if(window.onComponentsLoaded) onComponentsLoaded(); });

load();
</script>
</body>
</html>
